<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixa 01</title>
    <style>
        h1{
            height: 300px;
            width: 300px;
            background-color: aqua;
            border: 10px solid black;
            padding: 10px;
            margin: 10px;
            outline: 10px dashed blue;
        
        }

        a{
            border-width: 10px;
            border-style: solid;
            border-color: red;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">Links são exemplos de box-inline</a></p>
    
</body>
</html>
