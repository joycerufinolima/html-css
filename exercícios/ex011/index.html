<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente diminua e aumente o tamanho da tela do seu navegador</p>
    <picture>
        <source media="(max-width: 750px )" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px )" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="imagem flexivel">
    </picture>

    <h1>Reproduzindo audio forma 1</h1>
    <audio src="midias/audio.mp3" controls></audio>

    <h2>Reproduzindo audio forma 2</h2>
    <audio preload="metadata" controls>
        <source src="midias/audio.mp3" type="audio/mpeg">
        <source src="midias/audio.ogg" type="audio/ogg">
    </audio>

    
</body>
</html>
